name: ASP.NET CI/CD

on:
  push:
    branches:
      - master

jobs:

  docker:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t abbas737/aspnet-kurs-isi .

      - name: Push image
        run: |
          docker tag abbas737/aspnet-kurs-isi abbas737/aspnet-kurs-isi:latest
          docker push abbas737/aspnet-kurs-isi:latest

      - name: Deploy EC2
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m
          debug: true

          script: |
            docker pull abbas737/aspnet-kurs-isi:latest

            docker stop aspnet-app || true
            docker rm aspnet-app || true

            docker run -d \
              --name aspnet-app \
              -p 8081:8080 \
              abbas737/aspnet-kurs-isi:latest